<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="alternate" hreflang="en" href="https://survey-platform-three.vercel.app/" />
    
    <!-- Structured Data for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Survey App Kenya",
      "url": "https://survey-platform-three.vercel.app/",
      "description": "Share your opinions and earn rewards. Kenya's most trusted survey platform with instant M-Pesa withdrawals.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://survey-platform-three.vercel.app/surveys",
        "query-input": "required name=search_term_string"
      },
      "author": {
        "@type": "Organization",
        "name": "Survey App Kenya",
        "url": "https://survey-platform-three.vercel.app/"
      },
      "inLanguage": "en",
      "datePublished": "2024-01-01",
      "dateModified": "2026-04-08"
    }
    </script>
    
    <!-- Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Survey App Kenya",
      "url": "https://survey-platform-three.vercel.app/",
      "logo": "https://survey-platform-three.vercel.app/logo.png",
      "description": "Kenya's most trusted online survey platform. Earn money by sharing your opinions.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "KE",
        "addressRegion": "Kenya"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+254700000000",
        "contactType": "customer service",
        "availableLanguage": "English"
      },
      "sameAs": []
    }
    </script>
    
    <!-- LocalBusiness Schema for Kenyan users -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Survey App Kenya",
      "description": "Online survey platform allowing Kenyans to earn money through paid surveys",
      "url": "https://survey-platform-three.vercel.app/",
      "priceRange": "KES",
      "currenciesAccepted": "KES",
      "paymentAccepted: "M-Pesa"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Paynecta Payment Widget -->
    <script src="https://paynecta.co.ke/widget.js" data-slug="survey-app" defer></script>
    
    <!-- Version checker -->
    <script>
      (function() {
        const BUILD_TIME = '2026-04-08-08-11';
        const STORAGE_KEY = 'app_build_time';
        
        const lastBuild = localStorage.getItem(STORAGE_KEY);
        
        if (lastBuild && lastBuild !== BUILD_TIME) {
          console.log('📱 New version detected! Refreshing...');
          
          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(name => {
                if (name.includes('vite') || name.includes('survey')) {
                  caches.delete(name);
                }
              });
            });
          }
          
          localStorage.setItem(STORAGE_KEY, BUILD_TIME);
          window.location.reload(true);
        } else if (!lastBuild) {
          localStorage.setItem(STORAGE_KEY, BUILD_TIME);
        }
      })();
    </script>
  </body>
</html>
